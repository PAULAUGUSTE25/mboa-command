services:
  - type: web
    name: mboa-command-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node --experimental-sqlite server.js
    envVars:
      - key: NODE_VERSION
        value: 22.0.0
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/backend/database
      sizeGB: 1
